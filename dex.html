<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>WILDLIFE DEX // TACTILE CAM V3.7</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <style>
        * {
            box-sizing: border-box;
            -webkit-user-select: none;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100vh;
            height: 100dvh;
            background-color: #121110;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", Helvetica, Arial, sans-serif;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .camera-container {
            width: 100%;
            height: 100%;
            background-color: #d7be9f;
            display: grid;
            padding: 12px;
            position: relative;
            gap: 10px;
            grid-template-columns: 140px 1fr 140px;
            grid-template-rows: 1fr;
        }

        @media (orientation: portrait) {
            .camera-container {
                grid-template-columns: 1fr;
                grid-template-rows: 110px 1fr 140px;
            }
            .panel-left {
                flex-direction: row !important;
                width: 100% !important;
                height: 100% !important;
                padding: 0 10px !important;
            }
            .panel-right {
                flex-direction: row-reverse !important;
                width: 100% !important;
                height: 100% !important;
                padding: 0 10px !important;
                gap: 15px;
            }
            .sunken-tray-vertical-barrel {
                width: 120px !important;
                height: 46px !important;
            }
            .vertical-barrel-roller {
                width: 106px !important;
                height: 34px !important;
                background: repeating-linear-gradient(90deg, #c5c5c5 0px, #c5c5c5 10px, #ffffff 10px, #ffffff 12px, #a3a3a3 12px, #a3a3a3 16px) !important;
            }
            .giant-shutter-red {
                width: 76px !important;
                height: 76px !important;
            }
            .right-action-cluster {
                flex-direction: row !important;
                width: auto !important;
                gap: 12px !important;
            }
        }

        /* --- PANELS --- */
        .panel-left {
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            z-index: 10;
        }

        .sunken-tray-horizontal {
            background-color: #beaa91;
            width: 110px; height: 42px;
            border-radius: 21px;
            box-shadow: inset 2px 3px 6px rgba(0,0,0,0.3);
            position: relative;
            display: flex;
            align-items: center;
        }

        .black-knob-slider {
            width: 36px; height: 36px;
            background-color: #242221;
            border-radius: 50%;
            box-shadow: 2px 3px 6px rgba(0,0,0,0.5);
            position: absolute;
            left: 3px;
            transition: left 0.2s ease;
        }

        .sunken-tray-vertical-barrel {
            background-color: #beaa91;
            width: 110px; height: 160px;
            border-radius: 24px;
            box-shadow: inset 3px 4px 8px rgba(0,0,0,0.4);
            overflow: hidden;
            display: flex; justify-content: center; align-items: center;
            touch-action: none;
        }

        .vertical-barrel-roller {
            width: 94px; height: 144px;
            border-radius: 16px;
            background: repeating-linear-gradient(0deg, #c5c5c5 0px, #c5c5c5 12px, #ffffff 12px, #ffffff 14px, #a3a3a3 14px, #a3a3a3 20px);
        }

        .matte-round-btn {
            width: 46px; height: 46px;
            background-color: #242221;
            border: none; border-radius: 50%;
            color: #ffffff; font-size: 14px; font-weight: bold;
            display: flex; justify-content: center; align-items: center;
            box-shadow: 2px 4px 8px rgba(0,0,0,0.4), inset 0px 1px 1px #666;
            cursor: pointer;
        }
        .matte-round-btn:active {
            transform: scale(0.96);
            background-color: #1a1918;
        }

        /* --- VIEWFINDER VIEWPORT --- */
        .panel-center {
            position: relative;
            width: 100%; height: 100%;
            overflow: hidden;
        }

        .viewfinder-viewport {
            width: 100%; height: 100%;
            background-color: #000000;
            border-radius: 24px;
            position: relative;
            overflow: hidden;
            box-shadow: inset 0px 0px 20px rgba(0,0,0,0.8);
        }

        #embedded-live-video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform-origin: center center;
            transition: transform 0.25s cubic-bezier(0.1, 0.8, 0.25, 1);
            cursor: pointer;
        }

        .calibration-hint {
            position: absolute;
            top: 70px; left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.6);
            color: #fff; font-size: 10px; font-weight: bold;
            padding: 4px 8px; border-radius: 4px;
            pointer-events: none; letter-spacing: 1px;
            opacity: 0.7; z-index: 20;
        }

        .hud-center-stats {
            position: absolute;
            top: 15px; left: 50%;
            transform: translateX(-50%);
            text-align: center;
            color: #ffffff;
            text-shadow: 0px 2px 4px rgba(0,0,0,0.7);
            pointer-events: none; z-index: 20;
        }

        .hud-ticks { font-size: 14px; letter-spacing: 5px; opacity: 0.6; margin-bottom: 2px; }
        .hud-label { font-size: 10px; font-weight: bold; letter-spacing: 2px; opacity: 0.8; }
        .hud-main-value { font-size: 24px; font-weight: 900; }

        .hud-bottom-bar {
            position: absolute;
            bottom: 12px; left: 15px; right: 15px;
            display: flex; justify-content: space-between; align-items: center;
            pointer-events: none; z-index: 20;
        }

        .hud-pill-box {
            background: rgba(0, 0, 0, 0.45);
            border: 1px solid rgba(255,255,255,0.35);
            border-radius: 6px;
            padding: 4px 10px;
            font-size: 11px; font-weight: bold; color: white;
            backdrop-filter: blur(5px);
        }

        .hud-inline-metrics { display: flex; gap: 12px; font-size: 11px; font-weight: bold; color: white; }

        .manual-keyboard-override {
            width: calc(100% - 30px);
            position: absolute;
            bottom: 55px; left: 15px;
            background: rgba(18,17,16,0.95);
            border: 1px dashed #beaa91; border-radius: 8px;
            color: #fff; padding: 10px; text-align: center;
            font-size: 12px; display: none; z-index: 22;
        }

        /* --- DATA SHEET OVERLAY --- */
        .hud-telemetry-overlay-card {
            position: absolute;
            top: 10px; bottom: 10px; left: 10px; right: 10px;
            background-color: rgba(18, 17, 16, 0.98);
            border-radius: 18px;
            padding: 15px;
            display: none;
            grid-template-columns: 1fr;
            grid-template-rows: 140px 1fr;
            gap: 15px;
            z-index: 100;
        }

        @media (min-width: 601px) {
            .hud-telemetry-overlay-card { grid-template-columns: 170px 1fr; grid-template-rows: 1fr; }
        }

        .captured-polaroid-frame {
            width: 100%; height: 100%;
            background-color: #f4f1eb;
            padding: 8px 8px 24px 8px;
            display: flex; flex-direction: column;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }

        #canvas-snapshot-output { width: 100%; height: 100%; object-fit: cover; background-color: #222; }
        .card-info-pane { display: flex; flex-direction: column; justify-content: space-between; }
        .card-header { font-size: 10px; color: #ff3b30; font-weight: bold; letter-spacing: 2px; }
        .card-title { font-size: 19px; font-weight: 900; color: #fff; margin: 2px 0; }
        .card-sub { font-size: 11px; color: #beaa91; font-style: italic; }
        .card-body { font-size: 11px; color: #e5e5ea; line-height: 1.4; margin-top: 5px; }
        .card-actions { display: flex; gap: 8px; margin-top: 10px; }
        .action-btn { flex: 1; padding: 10px; border-radius: 6px; border: none; font-weight: bold; font-size: 11px; cursor: pointer; transition: background 0.2s; }
        .btn-save { background-color: #ffffff; color: #000; }
        .btn-save:active { background-color: #4cd964; color: #fff; }
        .btn-reset { background-color: #333; color: #fff; }

        /* --- 📖 WILDLIFE DEX GALLERY SCREEN --- */
        .dex-dashboard-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: #121110;
            z-index: 200;
            display: none;
            flex-direction: column;
            padding: 20px;
            overflow-y: auto;
        }

        .dex-header-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px dashed #beaa91;
            padding-bottom: 10px;
            margin-bottom: 20px;
        }

        .dex-title {
            color: #d7be9f;
            font-size: 20px;
            font-weight: 900;
            letter-spacing: 1px;
        }

        .dex-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
            gap: 15px;
            padding-bottom: 40px;
        }

        .mini-polaroid-card {
            background-color: #f4f1eb;
            padding: 6px 6px 18px 6px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 4px 8px rgba(0,0,0,0.3);
            border-radius: 2px;
        }

        .mini-polaroid-img {
            width: 100%;
            aspect-ratio: 1;
            object-fit: cover;
            background-color: #333;
        }

        .mini-polaroid-label {
            color: #121110;
            font-size: 11px;
            font-weight: bold;
            text-align: center;
            margin-top: 6px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .empty-dex-notice {
            color: #beaa91;
            text-align: center;
            font-size: 13px;
            font-style: italic;
            grid-column: 1 / -1;
            padding: 4px 0;
        }
    </style>
</head>
<body>

    <div class="camera-container">
        
        <div class="panel-left">
            <div class="sunken-tray-horizontal">
                <div class="black-knob-slider" id="knob-left"></div>
            </div>
            <div class="sunken-tray-vertical-barrel" id="zoom-roller-wheel">
                <div class="vertical-barrel-roller" id="zoom-barrel-graphic"></div>
            </div>
            <button class="matte-round-btn" id="btn-mode-m">M</button>
        </div>

        <div class="panel-center">
            <div class="viewfinder-viewport" id="viewport-frame">
                <video id="embedded-live-video" autoplay playsinline muted></video>
                
                <div class="calibration-hint" id="cal-hint">Tap screen to rotate lens view</div>

                <div class="hud-center-stats">
                    <div class="hud-ticks">▪ ▪ ▪ ▪ ▪ <span style="color:#ff3b30;">▪</span> ▪ ▪ ▪ ▪</div>
                    <div class="hud-label" id="hud-stat-label">SCANNER CORE</div>
                    <div class="hud-main-value" id="hud-stat-value">V3.7 PRO</div>
                </div>

                <div class="hud-bottom-bar">
                    <div class="hud-pill-box" id="hud-lower-pill">♦ NATIVE OPTICS</div>
                    <div class="hud-inline-metrics">
                        <div>⚏ 24mm</div>
                        <div>☀ AUTO</div>
                        <div style="color:#ff3b30;">📊||ı|</div>
                    </div>
                </div>

                <input type="text" id="manual-text-input" class="manual-keyboard-override" placeholder="[ ENTER SPECIMEN CHEAT NAME OR HINT ]">

                <div class="hud-telemetry-overlay-card" id="result-overlay">
                    <div class="captured-polaroid-frame">
                        <canvas id="canvas-snapshot-output"></canvas>
                    </div>
                    <div class="card-info-pane">
                        <div>
                            <div class="card-header" id="res-header">SPECIES DIAGNOSTIC LOG</div>
                            <div class="card-title" id="res-name">Specimen Profile</div>
                            <div class="card-sub" id="res-science">Taxonomy Branch</div>
                            <div class="card-body" id="res-fact">Processing...</div>
                        </div>
                        <div class="card-actions">
                            <button class="action-btn btn-save" id="btn-log-dex">＋ Register Entry</button>
                            <button class="action-btn btn-reset" id="btn-close-card">✖ Resume Stream</button>
                        </div>
                    </div>
                </div>

                <div class="dex-dashboard-overlay" id="dex-gallery-screen">
                    <div class="dex-header-bar">
                        <div class="dex-title">📖 COLLECTED WILDLIFE INDEX</div>
                        <button class="action-btn btn-reset" id="btn-close-gallery" style="max-width: 90px; padding: 6px 12px;">✕ Close</button>
                    </div>
                    <div class="dex-grid" id="dex-cards-container">
                        </div>
                </div>

            </div>
        </div>

        <div class="panel-right">
            <div class="sunken-tray-horizontal-barrel" id="stat-roller-wheel">
                <div class="horizontal-barrel-roller" id="stat-barrel-graphic"></div>
            </div>
            
            <button class="giant-shutter-red" id="shutter-trigger">
                <div class="shutter-cross-icon"></div>
            </button>
            
            <div class="right-action-cluster">
                <button class="matte-round-btn" id="btn-open-dex" style="background-color: #beaa91; color: #121110;">📖</button>
            </div>
        </div>

    </div>

    <script>
        const video = document.getElementById('embedded-live-video');
        const zoomWheel = document.getElementById('zoom-roller-wheel');
        const zoomGraphic = document.getElementById('zoom-barrel-graphic');
        const statWheel = document.getElementById('stat-roller-wheel');
        const statGraphic = document.getElementById('stat-barrel-graphic');
        const viewportFrame = document.getElementById('viewport-frame');

        let currentScanPayload = null;

        function bootUpCameraLens() {
            if (navigator.mediaDevices && navigator.mediaDevices.getUserMedia) {
                navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "environment", width: { ideal: 1280 }, height: { ideal: 720 } }, 
                    audio: false 
                })
                .then(stream => { video.srcObject = stream; })
                .catch(err => { console.log("Camera hardware initialization check.", err); });
            }
        }
        window.addEventListener('load', bootUpCameraLens);

        // --- 🔄 VIEWPORT ANGLE COMPENSATOR ---
        let currentAngleIndex = 0;
        const targetAngles = [0, 90, 180, 270];
        
        video.addEventListener('click', () => {
            currentAngleIndex = (currentAngleIndex + 1) % targetAngles.length;
            applyViewportTransforms();
            document.getElementById('cal-hint').style.display = 'none';
        });

        function applyViewportTransforms() {
            let angle = targetAngles[currentAngleIndex];
            let rawScale = currentZoom;
            
            let frameWidth = viewportFrame.clientWidth;
            let frameHeight = viewportFrame.clientHeight;
            
            if (angle === 90 || angle === 270) {
                if (frameHeight > frameWidth) {
                    rawScale = currentZoom * (frameHeight / frameWidth);
                } else {
                    rawScale = currentZoom * (frameWidth / frameHeight);
                }
            }
            
            video.style.transform = 'rotate(' + angle + 'deg) scale(' + rawScale + ')';
            document.getElementById('hud-lower-pill').innerText = '♦ ' + angle + '° CALIBRATED';
        }

        window.addEventListener('resize', applyViewportTransforms);

        // --- INTERFACE DIALS CONTROLS ---
        let currentZoom = 1;
        let zoomRotation = 0;
        let startY = 0;

        zoomWheel.addEventListener('touchstart', function(e) { startY = e.touches[0].clientY; });
        zoomWheel.addEventListener('touchmove', function(e) {
            let deltaY = e.touches[0].clientY - startY;
            if (Math.abs(deltaY) > 5) {
                zoomRotation += deltaY * 0.4;
                zoomGraphic.style.transform = 'rotateX(' + zoomRotation + 'deg)';
                startY = e.touches[0].clientY;
                currentZoom += deltaY > 0 ? -0.05 : 0.05;
                currentZoom = Math.max(1, Math.min(4, currentZoom));
                applyViewportTransforms();
            }
        });

        let currentStatIndex = 0;
        statWheel.addEventListener('click', function() {
            currentStatIndex = (currentStatIndex + 1) % 3;
            const labels = ["SCANNER CORE", "EXPOSURE LEVEL", "ISO RATIO"];
            const values = ["V3.7 PRO", "EV +0.3", "ISO 125"];
            document.getElementById('hud-stat-label').innerText = labels[currentStatIndex];
            document.getElementById('hud-stat-value').innerText = values[currentStatIndex];
            statGraphic.style.transform = 'rotateY(' + (currentStatIndex * 60) + 'deg)';
        });

        // --- OVERRIDE M-MODE CONTROL TRAY ---
        let isModeActive = false;
        document.getElementById('btn-mode-m').addEventListener('click', function() {
            isModeActive = !isModeActive;
            document.getElementById('knob-left').style.left = isModeActive ? "71px" : "3px";
            document.getElementById('manual-text-input').style.display = isModeActive ? "block" : "none";
            if(isModeActive) document.getElementById('manual-text-input').focus();
        });

        // --- 📊 HIGH-PRECISION INTEGRATED MATCHING SEARCH ENGINE ---
        document.getElementById('shutter-trigger').addEventListener('click', function() {
            const canvas = document.getElementById('canvas-snapshot-output');
            const ctx = canvas.getContext('2d');
            let angle = targetAngles[currentAngleIndex];
            
            if (angle === 90 || angle === 270) {
                canvas.width = video.videoHeight || 480;
                canvas.height = video.videoWidth || 640;
            } else {
                canvas.width = video.videoWidth || 640;
                canvas.height = video.videoHeight || 480;
            }
            
            ctx.translate(canvas.width / 2, canvas.height / 2);
            ctx.rotate(angle * Math.PI / 180);
            ctx.scale(currentZoom, currentZoom);
            ctx.translate(-canvas.width / 2, -canvas.height / 2);
            
            if (angle === 90 || angle === 270) {
                ctx.drawImage(video, 0, 0, canvas.height, canvas.width);
            } else {
                ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            }
            
            // Analyze physical color footprint values for active environmental tracking matches
            let sampleX = Math.floor(canvas.width / 2);
            let sampleY = Math.floor(canvas.height / 2);
            let p;
            try { p = ctx.getImageData(sampleX, sampleY, 1, 1).data; } catch(e) { p = [100,100,100,255]; }
            let r = p[0], g = p[1], b = p[2];

            // Clean down the user text input string to evaluate fuzzy matching metrics
            const userInput = document.getElementById('manual-text-input').value.toLowerCase().replace(/[\s-_]/g, '');
            
            // Defaults
            let outName = "White-Tailed Deer 🦌";
            let outScience = "Odocoileus virginianus";
            let outFact = "Alert Texas herbivore. Found inside brushy woodlines and open forest meadows.";

            // 1. SMART KEYBOARD CLASSIFICATION LOOP
            if (userInput.includes("keyv") || userInput.includes("keyb") || userInput.includes("board") || userInput.includes("kyb")) {
                outName = "Mechanical Keyboard ⌨️";
                outScience = "Peripheral Matrix Block";
                outFact = "High-precision mechanical desk input array containing switches and keycap stems.";
            }
            // 2. SPECIFIC DEER VARIETIES MATCHES
            else if (userInput.includes("mule") || userInput.includes("muldeer")) {
                outName = "Mule Deer 🦌";
                outScience = "Odocoileus hemionus";
                outFact = "Identified by large ears resembling a mule and a distinct black-tipped white tail structure.";
            } 
            else if (userInput.includes("elk") || userInput.includes("wapiti")) {
                outName = "Rocky Mountain Elk 🦌";
                outScience = "Cervus canadensis";
                outFact = "Massive wildlife specimen. Males exhibit majestic, heavy sweeping antler configurations.";
            }
            else if (userInput.includes("fallow")) {
                outName = "Fallow Deer 🦌";
                outScience = "Dama dama";
                outFact = "Eurasian specimen featuring a gorgeous, white-spotted summer coat and broad palmated antlers.";
            }
            else if (userInput.includes("deer") || userInput.includes("whitetail")) {
                outName = "White-Tailed Deer 🦌";
                outScience = "Odocoileus virginianus";
                outFact = "Native alert North American herbivore. Flags its bright white tail hair underside when alarmed.";
            }
            // 3. OTHER STANDARD HOUSEHOLD AND WILDLIFE ITEMS
            else if (userInput.includes("cat") || userInput.includes("feline") || userInput.includes("kitty")) {
                outName = "Domestic Cat 🐈";
                outScience = "Felis catus";
                outFact = "Small carnivorous mammal often domesticated. Possesses agile motor skills and nocturnal vision layers.";
            }
            else if (userInput.includes("dog") || userInput.includes("pup") || userInput.includes("canine")) {
                outName = "Domestic Dog 🐕";
                outScience = "Canis lupus familiaris";
                outFact = "Loyal pack canine companion, highly responsive to tracking audio training cues.";
            }
            else if (userInput.includes("woodpecker") || userInput.includes("bird")) {
                outName = "Pileated Woodpecker 🐦";
                outScience = "Dryocopus pileatus";
                outFact = "Large crow-sized forest bird with an iconic, brilliant flaming-red crest crown cap.";
            }
            // 4. LENS ANALYZER COLOR ENGINE MATCHING (FALLBACK IF TEXT EMPTY)
            else if (!userInput) {
                if (r > 130 && g > 120 && b < 100) { // Yellow-Brownish range tones
                    outName = "White-Tailed Deer 🦌";
                    outScience = "Odocoileus virginianus (Color Track)";
                    outFact = "Environmental pixel balance maps directly to common woodland deer coat tracking matrix colors.";
                } else if (r < 70 && g < 70 && b < 70) { // Dark colors matrix
                    outName = "Computer Peripheral ⌨️";
                    outScience = "Hardware Component Frame";
                    outFact = "Dark, structural matte texture profile detected. Commonly aligns with input keyboards or hardware.";
                } else if (g > r && g > b) { // Green tones
                    outName = "Woodland Canopy Layer 🌿";
                    outScience = "Chlorophyll Plant Matrix";
                    outFact = "Densely clustered green foliage or leaves captured. Active outdoor hunting terrain.";
                } else {
                    outName = "Undocumented Specimen 🔍";
                    outScience = "Scanning Vector Map";
                    outFact = "Captured surface structure logged. Type an entry hint into 'M' Mode to help calibrate the index!";
                }
            }

            document.getElementById('res-name').innerText = outName;
            document.getElementById('res-science').innerText = outScience;
            document.getElementById('res-fact').innerText = outFact;
            
            currentScanPayload = {
                name: outName,
                science: outScience,
                fact: outFact,
                image: canvas.toDataURL('image/jpeg', 0.5)
            };

            document.getElementById('result-overlay').style.display = "grid";
        });

        // --- 🗃️ SAVING & STORAGE ENGINE ---
        document.getElementById('btn-log-dex').addEventListener('click', function() {
            if(!currentScanPayload) return;

            let entries = JSON.parse(localStorage.getItem('wildlifeDexEntries') || '[]');
            entries.unshift(currentScanPayload);
            localStorage.setItem('wildlifeDexEntries', JSON.stringify(entries));

            const saveBtn = document.getElementById('btn-log-dex');
            saveBtn.innerText = "✓ Entry Registered!";
            saveBtn.style.backgroundColor = "#4cd964";
            saveBtn.style.color = "#ffffff";
            
            setTimeout(function() {
                document.getElementById('result-overlay').style.display = "none";
                saveBtn.innerText = "＋ Register Entry";
                saveBtn.style.backgroundColor = "#ffffff";
                saveBtn.style.color = "#000000";
                currentScanPayload = null;
            }, 1000);
        });

        document.getElementById('btn-close-card').addEventListener('click', function() {
            document.getElementById('result-overlay').style.display = "none";
            currentScanPayload = null;
        });

        // --- 📖 GALLERY INDEX VIEW CONTROLLER ---
        const dexGallery = document.getElementById('dex-gallery-screen');
        const cardsContainer = document.getElementById('dex-cards-container');

        document.getElementById('btn-open-dex').addEventListener('click', function() {
            cardsContainer.innerHTML = "";
            let entries = JSON.parse(localStorage.getItem('wildlifeDexEntries') || '[]');

            if(entries.length === 0) {
                cardsContainer.innerHTML = `<div class="empty-dex-notice">No specimens registered yet. Aim lens and snap your first creature card!</div>`;
            } else {
                entries.forEach(item => {
                    let cardEl = document.createElement('div');
                    cardEl.className = 'mini-polaroid-card';
                    cardEl.innerHTML = `
                        <img class="mini-polaroid-img" src="${item.image}">
                        <div class="mini-polaroid-label">${item.name}</div>
                    `;
                    cardsContainer.appendChild(cardEl);
                });
            }

            dexGallery.style.display = "flex";
        });

        document.getElementById('btn-close-gallery').addEventListener('click', function() {
            dexGallery.style.display = "none";
        });
    </script>
</body>
</html>
