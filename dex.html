<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>NOT BORING // TACTILE CAM PRO</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <style>
        * {
            box-sizing: border-box;
            -webkit-user-select: none;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            /* Fixes the Safari shift bug by locking to Dynamic Viewport Height */
            height: 100vh;
            height: 100dvh; 
            background-color: #121110;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", Helvetica, Arial, sans-serif;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Viewport Frame - Uses dynamic constraints to prevent elements cutting off */
        .camera-container {
            width: 100%;
            height: 100%;
            background-color: #d7be9f;
            display: grid;
            grid-template-columns: 1fr;
            grid-template-rows: 120px 1fr 130px;
            padding: 10px;
            position: relative;
        }

        /* --- TOP CONTROL PANEL --- */
        .panel-left {
            display: flex;
            flex-direction: row !important;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            height: 100%;
            padding: 0 10px;
            z-index: 10;
        }

        .sunken-tray-horizontal {
            background-color: #beaa91;
            width: 110px; height: 42px;
            border-radius: 21px;
            box-shadow: inset 2px 3px 6px rgba(0,0,0,0.3);
            position: relative;
            display: flex;
            align-items: center;
        }

        .black-knob-slider {
            width: 36px; height: 36px;
            background-color: #242221;
            border-radius: 50%;
            box-shadow: 2px 3px 6px rgba(0,0,0,0.5);
            position: absolute;
            left: 3px;
            transition: left 0.2s ease;
        }

        .sunken-tray-vertical-barrel {
            background-color: #beaa91;
            width: 130px;
            height: 52px;
            border-radius: 24px;
            box-shadow: inset 3px 4px 8px rgba(0,0,0,0.4);
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            touch-action: none;
        }

        .vertical-barrel-roller {
            width: 116px;
            height: 42px;
            border-radius: 12px;
            background: repeating-linear-gradient(90deg, #c5c5c5 0px, #c5c5c5 10px, #ffffff 10px, #ffffff 12px, #a3a3a3 12px, #a3a3a3 16px);
            box-shadow: 0px 4px 10px rgba(0,0,0,0.3);
        }

        .dual-buttons-row {
            display: flex;
            gap: 10px;
        }

        .matte-round-btn {
            width: 44px; height: 44px;
            background-color: #242221;
            border: none; border-radius: 50%;
            color: #ffffff; font-size: 15px; font-weight: bold;
            display: flex; justify-content: center; align-items: center;
            cursor: pointer;
            box-shadow: 2px 4px 8px rgba(0,0,0,0.4), inset 0px 1px 1px #666;
        }

        /* --- CENTER PANEL (STABLE VIEWPORT) --- */
        .panel-center {
            position: relative;
            width: 100%; height: 100%;
            padding: 2px;
            overflow: hidden;
        }

        .viewfinder-viewport {
            width: 100%; height: 100%;
            background-color: #000000;
            border-radius: 24px;
            position: relative;
            overflow: hidden;
            box-shadow: inset 0px 0px 20px rgba(0,0,0,0.8);
        }

        /* Rotates and fits the camera stream to be upright in vertical mode */
        #embedded-live-video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: rotate(90deg) scale(1.4); 
            transform-origin: center center;
            transition: filter 0.3s ease;
        }

        .hud-center-stats {
            position: absolute;
            top: 15px; left: 50%;
            transform: translateX(-50%);
            text-align: center;
            color: #ffffff;
            text-shadow: 0px 2px 4px rgba(0,0,0,0.7);
            pointer-events: none;
        }

        .hud-ticks { font-size: 14px; letter-spacing: 5px; opacity: 0.6; margin-bottom: 2px; }
        .hud-label { font-size: 10px; font-weight: bold; letter-spacing: 2px; opacity: 0.8; }
        .hud-main-value { font-size: 24px; font-weight: 900; margin-top: 1px; }

        .hud-bottom-bar {
            position: absolute;
            bottom: 12px; left: 15px; right: 15px;
            display: flex; justify-content: space-between; align-items: center;
            pointer-events: none;
        }

        .hud-pill-box {
            background: rgba(0, 0, 0, 0.45);
            border: 1px solid rgba(255,255,255,0.35);
            border-radius: 6px;
            padding: 4px 10px;
            font-size: 11px; font-weight: bold; color: white;
            backdrop-filter: blur(5px);
        }

        .hud-inline-metrics {
            display: flex; gap: 12px;
            font-size: 11px; font-weight: bold; color: white;
        }

        .manual-keyboard-override {
            width: calc(100% - 30px);
            position: absolute;
            bottom: 55px; left: 15px;
            background: rgba(18,17,16,0.95);
            border: 1px dashed #555; border-radius: 8px;
            color: #fff; padding: 10px; text-align: center;
            font-size: 11px; display: none; z-index: 12;
        }

        /* --- BOTTOM CONTROL PANEL --- */
        .panel-right {
            display: flex;
            flex-direction: row-reverse !important;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            height: 100%;
            padding: 0 10px;
            z-index: 10;
        }

        .sunken-tray-horizontal-barrel {
            background-color: #beaa91;
            width: 115px; height: 48px;
            border-radius: 14px;
            box-shadow: inset 2px 3px 6px rgba(0,0,0,0.4);
            overflow: hidden;
            display: flex; justify-content: center; align-items: center;
            touch-action: none;
        }

        .horizontal-barrel-roller {
            width: 102px; height: 38px;
            border-radius: 8px;
            background: repeating-linear-gradient(90deg, #c5c5c5 0px, #c5c5c5 10px, #ffffff 10px, #ffffff 12px, #a3a3a3 12px, #a3a3a3 16px);
        }

        .giant-shutter-red {
            width: 85px; height: 85px;
            background-color: #ff3b30;
            border: none; border-radius: 50%;
            cursor: pointer;
            box-shadow: inset 1px 2px 3px rgba(255,255,255,0.4), 0px 6px 12px rgba(0,0,0,0.45);
            display: flex; justify-content: center; align-items: center;
        }

        .shutter-cross-icon {
            width: 22px; height: 4px; background-color: #ffffff; position: relative;
        }
        .shutter-cross-icon::before {
            content: ""; width: 4px; height: 22px; background-color: #ffffff;
            position: absolute; top: -9px; left: 9px;
        }

        .right-lower-combo {
            display: flex; align-items: center; gap: 8px;
        }
        .dots-track { display: flex; gap: 4px; }
        .dot { width: 5px; height: 5px; background-color: #8b7761; border-radius: 50%; }
        .dot.active { background-color: #ffffff; }

        /* --- POPUP CARD --- */
        .hud-telemetry-overlay-card {
            position: absolute;
            top: 10px; bottom: 10px; left: 10px; right: 10px;
            background-color: rgba(18, 17, 16, 0.98);
            border-radius: 18px;
            padding: 15px;
            display: none;
            grid-template-columns: 1fr;
            grid-template-rows: 120px 1fr;
            gap: 15px;
            z-index: 100;
        }

        .captured-polaroid-frame {
            width: 100%; height: 100%;
            background-color: #f4f1eb;
            padding: 6px 6px 20px 6px;
            display: flex; flex-direction: column;
        }

        #canvas-snapshot-output {
            width: 100%; height: 100%;
            object-fit: cover;
            background-color: #222;
        }

        .card-info-pane {
            display: flex; flex-direction: column; justify-content: space-between;
        }
        .card-header { font-size: 10px; color: #ff3b30; font-weight: bold; letter-spacing: 2px; }
        .card-title { font-size: 18px; font-weight: 900; color: #fff; margin: 2px 0; }
        .card-sub { font-size: 11px; color: #beaa91; font-style: italic; }
        .card-body { font-size: 11px; color: #e5e5ea; line-height: 1.4; }
        
        .card-actions { display: flex; gap: 8px; }
        .action-btn {
            flex: 1; padding: 10px; border-radius: 6px; border: none;
            font-weight: bold; font-size: 11px; cursor: pointer;
        }
        .btn-save { background-color: #ffffff; color: #000; }
        .btn-reset { background-color: #333; color: #fff; }
    </style>
</head>
<body>

    <div class="camera-container">
        
        <!-- TOP ROW PANEL -->
        <div class="panel-left">
            <div class="sunken-tray-horizontal">
                <div class="black-knob-slider" id="knob-left"></div>
            </div>
            <div class="sunken-tray-vertical-barrel" id="zoom-roller-wheel">
                <div class="vertical-barrel-roller" id="zoom-barrel-graphic"></div>
            </div>
            <div class="dual-buttons-row">
                <button class="matte-round-btn" id="btn-filters">🎛️</button>
                <button class="matte-round-btn" id="btn-mode-m">M</button>
            </div>
        </div>

        <!-- STABLE VIEWFINDER -->
        <div class="panel-center">
            <div class="viewfinder-viewport">
                <video id="embedded-live-video" autoplay playsinline muted></video>

                <div class="hud-center-stats">
                    <div class="hud-ticks">▪ ▪ ▪ ▪ ▪ <span style="color:#ff3b30;">▪</span> ▪ ▪ ▪ ▪</div>
                    <div class="hud-label" id="hud-stat-label">SHUTTER SPEED</div>
                    <div class="hud-main-value" id="hud-stat-value">1/210</div>
                </div>

                <div class="hud-bottom-bar">
                    <div class="hud-pill-box" id="hud-lower-pill">♦ 1/210</div>
                    <div class="hud-inline-metrics">
                        <div>⚏ 18</div>
                        <div>☀ 5440K</div>
                        <div style="color:#ff3b30;">📊||ı|</div>
                    </div>
                </div>

                <input type="text" id="manual-text-input" class="manual-keyboard-override" placeholder="[ ENTER TARGET VALUES OVERRIDE ]">

                <div class="hud-telemetry-overlay-card" id="result-overlay">
                    <div class="captured-polaroid-frame">
                        <canvas id="canvas-snapshot-output"></canvas>
                    </div>
                    <div class="card-info-pane">
                        <div>
                            <div class="card-header">Hardware Capture Diagnostics</div>
                            <div class="card-title" id="res-name">Specimen Active</div>
                            <div class="card-sub" id="res-science">Taxonomy Branch</div>
                            <div class="card-body" id="res-fact">Processing data loops...</div>
                        </div>
                        <div class="card-actions">
                            <button class="action-btn btn-save" id="btn-log-dex">＋ Register Entry</button>
                            <button class="action-btn btn-reset" id="btn-close-card">✖ Resume Stream</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- BOTTOM ROW PANEL -->
        <div class="panel-right">
            <div class="sunken-tray-horizontal-barrel" id="stat-roller-wheel">
                <div class="horizontal-barrel-roller" id="stat-barrel-graphic"></div>
            </div>
            <button class="giant-shutter-red" id="shutter-trigger">
                <div class="shutter-cross-icon"></div>
            </button>
            <div class="right-lower-combo">
                <div class="dots-track">
                    <div class="dot active" id="dot-f0"></div>
                    <div class="dot" id="dot-f1"></div>
                    <div class="dot" id="dot-f2"></div>
                    <div class="dot" id="dot-f3"></div>
                </div>
                <button class="matte-round-btn" id="btn-filter-toggle">⌌%</button>
            </div>
        </div>

    </div>

    <script>
        const video = document.getElementById('embedded-live-video');
        const zoomWheel = document.getElementById('zoom-roller-wheel');
        const zoomGraphic = document.getElementById('zoom-barrel-graphic');
        const statWheel = document.getElementById('stat-roller-wheel');
        const statGraphic = document.getElementById('stat-barrel-graphic');

        function bootUpCameraLens() {
            if (navigator.mediaDevices && navigator.mediaDevices.getUserMedia) {
                navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "environment", width: { ideal: 1280 }, height: { ideal: 720 } }, 
                    audio: false 
                })
                .then(stream => { video.srcObject = stream; })
                .catch(err => { console.log("Camera pending.", err); });
            }
        }
        window.addEventListener('load', bootUpCameraLens);

        // --- INTERFACE DIALS CONTROLS ---
        let currentZoom = 1;
        let zoomRotation = 0;
        let startY = 0;

        zoomWheel.addEventListener('touchstart', e => { startY = e.touches[0].clientY; });
        zoomWheel.addEventListener('touchmove', e => {
            let deltaY = e.touches[0].clientY - startY;
            if (Math.abs(deltaY) > 5) {
                zoomRotation += deltaY * 0.4;
                zoomGraphic.style.transform = `rotateX(${zoomRotation}deg)`;
                startY = e.touches[0].clientY;
                currentZoom += deltaY > 0 ? -0.05 : 0.05;
                currentZoom = Math.max(1, Math.min(4, currentZoom));
                video.style.transform = `rotate(90deg) scale(${(currentZoom * 1.4).toFixed(2)})`;
                document.getElementById('hud-lower-pill').innerText = `♦ ZOOM ${currentZoom.toFixed(1)}X`;
            }
        });

        let currentStatIndex = 0;
        statWheel.addEventListener('click', () => {
            currentStatIndex = (currentStatIndex + 1) % 3;
            const labels = ["SHUTTER SPEED", "EXPOSURE VALUE", "ISO OPTICS"];
            const values = ["1/210", "EV -0.7", "ISO 64"];
            document.getElementById('hud-stat-label').innerText = labels[currentStatIndex];
            document.getElementById('hud-stat-value').innerText = values[currentStatIndex];
            statGraphic.style.transform = `rotateY(${currentStatIndex * 60}deg)`;
        });

        // --- FILTERS ---
        let currentFilter = 0;
        const filterModes = ["none", "grayscale(1) contrast(1.7)", "hue-rotate(90deg) brightness(1.3)", "invert(1)"];
        function cycleFilters() {
            currentFilter = (currentFilter + 1) % 4;
            video.style.filter = filterModes[currentFilter];
            document.querySelectorAll('.dot').forEach((d, idx) => d.classList.toggle('active', idx === currentFilter));
        }
        document.getElementById('btn-filters').addEventListener('click', cycleFilters);
        document.getElementById('btn-filter-toggle').addEventListener('click', cycleFilters);

        // --- MANUAL OVERRIDE ---
        let isModeActive = false;
        document.getElementById('btn-mode-m').addEventListener('click', () => {
            isModeActive = !isModeActive;
            document.getElementById('knob-left').style.left = isModeActive ? "71px" : "3px";
            document.getElementById('manual-text-input').style.display = isModeActive ? "block" : "none";
        });

        // --- CAPTURE FIX FOR ROTATED CANVAS ---
        document.getElementById('shutter-trigger').addEventListener('click', () => {
            const canvas = document.getElementById('canvas-snapshot-output');
            const ctx = canvas.getContext('2d');
            
            // Swap canvas aspect layout parameters to natively match the 90deg view turn
            canvas.width = video.videoHeight || 480;
            canvas.height = video.videoWidth || 640;
            
            ctx.translate(canvas.width / 2, canvas.height / 2);
            ctx.rotate(90 * Math.PI / 180);
            ctx.translate(-canvas.width / 2, -canvas.height / 2);
            
            ctx.filter = getComputedStyle(video).filter;
            ctx.drawImage(video, 0, 0, canvas.height, canvas.width);
            
            const rawIn = document.getElementById('manual-text-input').value.toLowerCase().trim();
            if (rawIn.includes("woodpecker")) {
                document.getElementById('res-name').innerText = "Pileated Woodpecker 🐦";
                document.getElementById('res-science').innerText = "Dryocopus pileatus";
                document.getElementById('res-fact').innerText = "Crimson crest cap wood excavator.";
            } else {
                document.getElementById('res-name').innerText = "White-Tailed Deer 🦊";
                document.getElementById('res-science').innerText = "Odocoileus virginianus";
                document.getElementById('res-fact').innerText = "Native alert Texas herbivore.";
            }
            document.getElementById('result-overlay').style.display = "grid";
        });

        document.getElementById('btn-close-card').addEventListener('click', () => {
            document.getElementById('result-overlay').style.display = "none";
        });
    </script>
</body>
</html>
