<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>WILDLIFE DEX // TACTILE V3.9</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <style>
        * { box-sizing: border-box; -webkit-user-select: none; user-select: none; -webkit-tap-highlight-color: transparent; }
        html, body { margin: 0; padding: 0; width: 100%; height: 100vh; height: 100dvh; background: #121110; font-family: -apple-system, BlinkMacSystemFont, sans-serif; overflow: hidden; }
        
        .camera-container {
            display: grid;
            grid-template-columns: 100px 1fr 100px;
            width: 100%; height: 100%; padding: 10px; gap: 10px;
        }

        @media (orientation: portrait) {
            .camera-container { grid-template-columns: 1fr; grid-template-rows: 80px 1fr 100px; }
            .panel-left, .panel-right { flex-direction: row !important; }
        }

        .panel-left, .panel-right { display: flex; flex-direction: column; align-items: center; justify-content: space-between; }
        .viewport-container { position: relative; background: #000; border-radius: 20px; overflow: hidden; }
        video { width: 100%; height: 100%; object-fit: cover; }

        .btn-main { width: 60px; height: 60px; border-radius: 50%; border: none; background: #d7be9f; font-weight: bold; cursor: pointer; }
        #shutter-trigger { background: #ff3b30; }
        
        .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: none; padding: 20px; color: #fff; z-index: 50; }
        .input-field { width: 100%; padding: 15px; margin-top: 20px; border-radius: 10px; border: none; }
    </style>
</head>
<body>

    <div class="camera-container">
        <div class="panel-left">
            <button class="btn-main" id="btn-mode">M</button>
        </div>
        <div class="viewport-container">
            <video id="video" autoplay playsinline muted></video>
            <div id="ui-overlay" class="overlay">
                <h2 id="res-name">Scan Result</h2>
                <p id="res-fact"></p>
                <button class="btn-main" onclick="closeOverlay()">✕</button>
            </div>
            <input type="text" id="manual-input" class="input-field" style="display:none;" placeholder="Type animal name...">
        </div>
        <div class="panel-right">
            <button class="btn-main" id="shutter-trigger">◉</button>
            <button class="btn-main" id="btn-dex">📖</button>
        </div>
    </div>

    <script>
        const video = document.getElementById('video');
        const input = document.getElementById('manual-input');
        
        navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } })
            .then(s => video.srcObject = s);

        document.getElementById('btn-mode').onclick = () => input.style.display = (input.style.display === "none") ? "block" : "none";
        
        document.getElementById('shutter-trigger').onclick = () => {
            const txt = input.value.toLowerCase();
            let data = { name: "Unknown", fact: "No identification match." };
            
            const db = {
                "deer": { name: "White-Tailed Deer", fact: "Native herbivore, flashes white tail when scared." },
                "raccoon": { name: "Raccoon", fact: "Nocturnal scavenger with a bandit mask." },
                "coyote": { name: "Coyote", fact: "Highly intelligent and adaptable canine." },
                "hawk": { name: "Red-Tailed Hawk", fact: "Powerful raptor with keen vision." },
                "armadillo": { name: "Armadillo", fact: "Only mammal with a protective armor shell." }
            };

            for (let key in db) {
                if (txt.includes(key)) data = db[key];
            }

            document.getElementById('res-name').innerText = data.name;
            document.getElementById('res-fact').innerText = data.fact;
            document.getElementById('ui-overlay').style.display = "block";
        };

        function closeOverlay() { document.getElementById('ui-overlay').style.display = "none"; }
    </script>
</body>
</html>
